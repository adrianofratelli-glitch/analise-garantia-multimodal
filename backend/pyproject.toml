[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# FastAPI's Form(...)/Depends(...) as an argument default is the framework's
# documented pattern, not the mutable-default-argument bug B008 is designed to catch.
"main.py" = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
